<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URSA · تسجيل الأدمن</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #05201f, #0a2a28);
    }
    .auth-topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: rgba(8, 38, 36, 0.78);
      border-bottom: 1px solid rgba(77, 255, 158, 0.18);
      backdrop-filter: blur(10px);
      z-index: 1000;
    }
    .auth-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .container {
      width: 100%;
      max-width: 760px;
      margin: 110px auto 40px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body class="dark" data-admin-view="register">
  <div class="auth-topbar">
    <div class="logo-container">
      <div class="logo-image"><img src="URSA 3.png" alt="URSA Logo" /></div>
      <div class="logo">URSA</div>
    </div>
    <div class="auth-actions">
      <button id="langToggle" class="glass-btn small" data-i18n="lang_btn">English</button>
      <a href="admin-login.html" class="glass-btn small" style="text-decoration:none;" data-i18n="back_to_admin_login">العودة لتسجيل دخول الأدمن</a>
    </div>
  </div>

  <div class="container">
    <div class="glass-card auth-card">
      <h1 style="text-align:center; margin-bottom:16px;">
        <i class="fas fa-user-plus" style="color:var(--primary);"></i>
        <span data-i18n="register_title">تسجيل أدمن جديد</span>
      </h1>
      <p style="text-align:center; color:var(--text-secondary); margin-bottom:24px;" data-i18n="register_desc">أنشئ حسابًا إداريًا مرتبطًا بجهة محددة داخل المنصة.</p>

      <div class="error-message" id="authError" style="display:none;"></div>
      <div class="success-message" id="authSuccess" style="display:none;"></div>

      <form id="adminRegisterForm">
        <div class="grid">
          <div>
            <label for="adminFullName" data-i18n="full_name_label">الاسم الكامل</label>
            <input class="glass-input" id="adminFullName" type="text" data-i18n-placeholder="full_name_placeholder" placeholder="أدخل الاسم الكامل" required />
          </div>
          <div>
            <label for="adminRegisterUsername" data-i18n="username_label">اسم المستخدم</label>
            <input class="glass-input" id="adminRegisterUsername" type="text" data-i18n-placeholder="username_placeholder" placeholder="مثال: pm_admin" required />
          </div>
          <div>
            <label for="adminEmail" data-i18n="email_label">البريد الإلكتروني</label>
            <input class="glass-input" id="adminEmail" type="email" data-i18n-placeholder="email_placeholder" placeholder="name@example.com" required />
          </div>
          <div>
            <label for="adminPhone" data-i18n="phone_label">رقم الهاتف</label>
            <input class="glass-input" id="adminPhone" type="tel" inputmode="numeric" maxlength="11" data-i18n-placeholder="phone_placeholder" placeholder="11 رقمًا" required />
          </div>
          <div>
            <label for="adminNationalId" data-i18n="national_id_label">الرقم القومي</label>
            <input class="glass-input" id="adminNationalId" type="text" inputmode="numeric" maxlength="14" data-i18n-placeholder="national_id_placeholder" placeholder="14 رقمًا" required />
          </div>
          <div>
            <label for="adminMinistry" data-i18n="ministry_label">الجهة / الوزارة / مجال العمل</label>
            <select class="glass-select" id="adminMinistry" data-ministry-select="true" data-include-other="true" required></select>
          </div>
        </div>

        <div id="customMinistryWrapper" style="display:none;">
          <label for="adminCustomMinistry" data-i18n="custom_ministry_label">اسم الجهة الجديدة</label>
          <input class="glass-input" id="adminCustomMinistry" type="text" data-i18n-placeholder="custom_ministry_placeholder" placeholder="اكتب اسم الجهة أو الوزارة" />
        </div>

        <div class="grid">
          <div>
            <label for="adminRegisterPassword" data-i18n="password_label">كلمة المرور</label>
            <input class="glass-input" id="adminRegisterPassword" type="password" placeholder="••••••••" required />
          </div>
          <div>
            <label for="adminRegisterConfirmPassword" data-i18n="confirm_password_label">تأكيد كلمة المرور</label>
            <input class="glass-input" id="adminRegisterConfirmPassword" type="password" placeholder="••••••••" required />
          </div>
        </div>

        <button type="submit" class="glass-btn primary" style="width:100%;" data-i18n="create_account_btn">تسجيل الأدمن</button>
      </form>

      <div style="margin-top:20px; color:var(--text-secondary); text-align:center;" data-i18n="default_password_note">
        الحسابات الأساسية متاحة بكلمات المرور الافتراضية المحددة مسبقًا داخل المشروع.
      </div>
    </div>
  </div>

  <script src="platform-core.js"></script>
  <script src="admin-script.js"></script>
</body>
</html>
