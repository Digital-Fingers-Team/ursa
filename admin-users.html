<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URSA · حسابات الأدمن</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <style>
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 14px; text-align: start; border-bottom: 1px solid rgba(77, 255, 158, 0.2); color: var(--text-primary); vertical-align: top; }
    th { color: var(--primary); font-weight: 600; }
    .action-btn { padding: 8px 12px; border: none; border-radius: 10px; cursor: pointer; font-size: 0.85rem; margin: 2px 0; background: rgba(77, 191, 163, 0.18); color: var(--text-primary); }
    .delete-btn { background: rgba(255, 107, 107, 0.2); color: #ff6b6b; }
    .empty-state { text-align: center; padding: 40px; color: var(--text-secondary); }
  </style>
</head>
<body class="dark" data-admin-view="admins">
  <div class="container">
    <div class="glass-card" style="margin-bottom:20px;">
      <h1 id="pageTitle" style="font-size:3rem; margin-bottom:10px;">إدارة حسابات الأدمن</h1>
      <p id="pageSubtitle" style="color:var(--text-secondary);"></p>
    </div>

    <div class="glass-card" style="margin-bottom:20px;">
      <h2 style="margin-bottom:14px;"><i class="fas fa-user-shield"></i> <span data-i18n="admins_title">إدارة حسابات الأدمن</span></h2>
      <div id="adminAccountsList"></div>
    </div>

    <div class="glass-card">
      <h2 style="margin-bottom:14px;"><i class="fas fa-users"></i> <span data-i18n="citizens_title">المواطنون المسجلون</span></h2>
      <div id="citizenUsersList"></div>
    </div>
  </div>
  <script src="platform-core.js"></script>
  <script src="admin-script.js"></script>
</body>
</html>
