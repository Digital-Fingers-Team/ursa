<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URSA · Report Incident</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
</head>
<body class="dark">
  <div class="container">
    <div id="page-report" class="page active-page">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;"><h2><i class="fas fa-camera" style="color: var(--primary);"></i> <span data-i18n="report_title">Report incident</span></h2></div>
      <div class="glass-card">
        <div id="uploadInterface">
          <div style="display:flex; flex-wrap:wrap; gap:12px; margin-bottom:20px;">
            <button type="button" id="uploadImageButton" class="glass-btn primary" style="flex:1; min-width:220px;">
              <i class="fas fa-image"></i> <span data-i18n="select_photo_btn">Select Photo from Gallery</span>
            </button>
            <button type="button" id="uploadVideoButton" class="glass-btn" style="flex:1; min-width:220px;">
              <i class="fas fa-video"></i> <span data-i18n="select_video_btn">Select Video</span>
            </button>
          </div>
          <input type="file" id="reportImageInput" accept="image/*" style="display: none;">
          <input type="file" id="reportVideoInput" accept="video/*" style="display: none;">
          <div id="imagePreview" class="camera-preview"></div>
          <button type="button" id="removeImageBtn" class="glass-btn small" style="display: none; width: 100%; margin-top: 10px; margin-bottom: 20px;">
            <i class="fas fa-times"></i> <span data-i18n="remove_photo_btn">Remove Photo</span>
          </button>
          <div id="videoPreview" class="camera-preview"></div>
          <button type="button" id="removeVideoBtn" class="glass-btn small" style="display: none; width: 100%; margin-top: 10px; margin-bottom: 20px;">
            <i class="fas fa-times"></i> <span data-i18n="remove_video_btn">Remove Video</span>
          </button>
        </div>
        
        <form id="reportForm">
          <label data-i18n="request_type_label">Request type <span class="required-star">*</span></label>
          <div style="display:flex; flex-wrap:wrap; gap:12px; margin:16px 0;">
            <button type="button" class="glass-btn small request-type-btn" data-type="message">
              <i class="fas fa-envelope"></i> <span data-i18n="request_type_message">Message</span>
            </button>
            <button type="button" class="glass-btn small request-type-btn" data-type="complaint">
              <i class="fas fa-circle-exclamation"></i> <span data-i18n="request_type_complaint">Complaint</span>
            </button>
          </div>
          <input type="hidden" id="selectedReportType" required />
          <label data-i18n="description_label">Description <span class="required-star">*</span></label>
          <textarea class="glass-textarea" id="reportDescription" placeholder="Describe issue..." data-i18n-placeholder="description_placeholder" required></textarea>
          <label data-i18n="target_authority_label">Target authority <span class="required-star">*</span></label>
          <select class="glass-select" id="reportMinistry" required></select>
          <div style="margin: 16px 0;">
            <h3 style="margin-bottom:8px;" data-i18n="location_title">Location</h3>
            <div class="map-container" style="height: 320px;">
              <iframe id="reportMapFrame" title="Location Map" loading="lazy" referrerpolicy="no-referrer-when-downgrade" src="https://www.openstreetmap.org/export/embed.html?bbox=31.1300%2C30.4450%2C31.2200%2C30.4900&layer=mapnik&marker=30.4667%2C31.1848" style="width:100%;height:100%;border:0;"></iframe>
            </div>
            <button type="button" class="glass-btn small" id="useLocationBtn" style="margin-top:10px;"><i class="fas fa-location-crosshairs"></i> <span data-i18n="use_location_btn">Use my location</span></button>
            <label style="margin-top:12px;" data-i18n="location_label">Location <span class="required-star">*</span></label>
            <input class="glass-input" type="text" id="reportlocation" placeholder="Latitude, Longitude or address..." data-i18n-placeholder="location_placeholder" required>
          </div>
            <input type="hidden" id="selectedCategory" required />
          </div>
          <div style="display: flex; gap: 15px; margin-top: 20px;">
            <button type="submit" class="glass-btn primary" style="flex: 2;"><i class="fas fa-paper-plane"></i> <span data-i18n="submit_report_btn">Submit report</span></button>
            <button type="button" class="glass-btn" onclick="window.location.href='myreports.html'" style="flex: 1;"><i class="fas fa-list"></i> <span data-i18n="view_reports_btn">View reports</span></button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
