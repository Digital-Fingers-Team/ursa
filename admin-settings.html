<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URSA · Admin Settings</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
</head>
<body class="dark">
  <div class="container">
    <h1 style="font-size:3rem; margin-bottom: 30px;"><i class="fas fa-gear"></i> <span data-i18n="admin_settings_title">Admin Settings</span></h1>
    <div class="glass-card">
      <h2 style="margin-bottom: 20px;"><i class="fas fa-shield-alt"></i> <span data-i18n="system_configuration">System Configuration</span></h2>
      <div class="glass-card" style="margin-bottom: 20px; background: rgba(255, 255, 255, 0.05);">
        <h3><i class="fas fa-lock"></i> <span data-i18n="password_management">Password Management</span></h3>
        <p style="color: var(--text-secondary); margin-bottom: 15px;" data-i18n="admin_password_demo">Admin password is currently hardcoded for security demonstrations.</p>
        <button class="glass-btn small" disabled data-i18n="change_password_pro">Change Password (PRO)</button>
      </div>
      <div class="glass-card" style="margin-bottom: 20px; background: rgba(255, 255, 255, 0.05);">
        <h3><i class="fas fa-database"></i> <span data-i18n="data_management">Data Management</span></h3>
        <p style="color: var(--text-secondary); margin-bottom: 15px;" data-i18n="clear_all_system_data">Clear all system data (Users and Reports).</p>
        <button class="glass-btn" style="color: var(--danger); border-color: var(--danger);" onclick="wipeAllData()">
          <i class="fas fa-trash-alt"></i> <span data-i18n="wipe_all_data">Wipe All Data</span>
        </button>
      </div>
      <hr />
      <button class="glass-btn" style="width:100%; color: var(--danger); border-color: var(--danger);" onclick="adminLogout()">
        <i class="fas fa-sign-out-alt" style="margin-right: 10px;"></i> <span data-i18n="logout_admin_session">Log Out Admin Session</span>
      </button>
    </div>
  </div>
  <script src="admin-script.js"></script>
</body>
</html>
