<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URSA · Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
</head>
<body class="dark login-page">
  <div class="container">
    <div id="page-login" class="page active-page">
      <div class="glass-card auth-card">
        <h1 style="text-align:center; margin-bottom:20px;" data-i18n="login_welcome">Welcome back</h1>
        <p style="text-align:center; color: var(--text-secondary); margin-bottom:25px;" data-i18n="login_subtitle">Login to your URSA account</p>
        <div class="error-message" id="loginError"></div>
        <form id="loginForm">
          <label data-i18n="login_identifier_label">Phone or National ID <span class="required-star">*</span></label>
          <input class="glass-input" type="text" id="loginIdentifier" placeholder="Phone or National ID" data-i18n-placeholder="login_identifier_placeholder" required />
          <label data-i18n="login_password_label">Password <span class="required-star">*</span></label>
          <input class="glass-input" type="password" id="loginPassword" placeholder="Password" data-i18n-placeholder="login_password_placeholder" required />
          <button type="submit" class="glass-btn primary" style="width:100%; margin-bottom:16px;" data-i18n="login_btn">Login</button>
        </form>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <button class="glass-btn" style="flex:1;" id="goToRegister" type="button" data-i18n="create_account_btn">Create account</button>
          <a class="glass-btn" style="flex:1; text-align:center; text-decoration:none;" href="admin-login.html" data-i18n="admin_login_btn">Admin Login</a>
        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
