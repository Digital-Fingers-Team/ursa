<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URSA · Register</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="style.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
    rel="stylesheet" />
</head>

<body class="dark">
  <div class="container">
    <div id="page-register" class="page active-page">
      <div class="glass-card auth-card">
        <h1 style="text-align:center; margin-bottom:20px;" data-i18n="register_title">Create account</h1>
        <p style="text-align:center; color: var(--text-secondary); margin-bottom:25px;" data-i18n="register_subtitle">Register a new URSA profile</p>
        <div class="error-message" id="registerError" aria-live="assertive"></div>
        <div class="success-message" id="registerSuccess" aria-live="polite"></div>
        <form id="registerForm">
          <label data-i18n="register_as_label">Register as <span class="required-star">*</span></label>
          <select class="glass-select" id="regRole" required>
            <option value="citizen" selected data-i18n="role_citizen">Citizen</option>
            <option value="admin" data-i18n="role_admin">Admin</option>
          </select>
          <label data-i18n="full_name_label">Full name <span class="required-star">*</span></label>
          <input class="glass-input" type="text" id="regFullName" placeholder="Full name" data-i18n-placeholder="full_name_placeholder" autocomplete="name" required />
          <label data-i18n="national_id_label">National ID <span class="required-star">*</span></label>
          <input class="glass-input" type="text" id="regNationalId" placeholder="National ID" data-i18n-placeholder="national_id_placeholder" maxlength="14" inputmode="numeric" required />
          <label data-i18n="governorate_label">Governorate <span class="required-star">*</span></label>
          <select class="glass-select" id="regGovernorate" required>
            <option value="" disabled selected data-i18n="governorate_placeholder">-- Select Governorate --</option>
            <option value="Cairo">Cairo</option>
            <option value="Giza">Giza</option>
            <option value="Alexandria">Alexandria</option>
            <option value="Dakahlia">Dakahlia</option>
            <option value="Red Sea">Red Sea</option>
            <option value="Beheira">Beheira</option>
            <option value="Faiyum">Faiyum</option>
            <option value="Gharbia">Gharbia</option>
            <option value="Ismailia">Ismailia</option>
            <option value="Menofia">Menofia</option>
            <option value="Minya">Minya</option>
            <option value="Qalyubia">Qalyubia</option>
            <option value="New Valley">New Valley</option>
            <option value="Suez">Suez</option>
            <option value="Aswan">Aswan</option>
            <option value="Asyut">Asyut</option>
            <option value="Beni Suef">Beni Suef</option>
            <option value="Port Said">Port Said</option>
            <option value="Damietta">Damietta</option>
            <option value="Sharqia">Sharqia</option>
            <option value="South Sinai">South Sinai</option>
            <option value="Kafr El Sheikh">Kafr El Sheikh</option>
            <option value="Matrouh">Matrouh</option>
            <option value="Luxor">Luxor</option>
            <option value="Qena">Qena</option>
            <option value="North Sinai">North Sinai</option>
            <option value="Sohag">Sohag</option>
          </select>
          <label data-i18n="phone_label">Phone number <span class="required-star">*</span></label>
          <input class="glass-input" type="tel" id="regPhone" placeholder="Phone number (11 digits)" data-i18n-placeholder="phone_placeholder" maxlength="11" inputmode="numeric" autocomplete="tel" required />
          <label data-i18n="id_card_label">ID Card Image <span class="required-star">*</span></label>
          <input class="glass-input" type="file" id="regIdCard" accept="image/*" required />
          <label data-i18n="password_label">Password <span class="required-star">*</span></label>
          <input class="glass-input" type="password" id="regPassword" placeholder="Password" data-i18n-placeholder="password_placeholder" autocomplete="new-password" required />
          <label data-i18n="confirm_password_label">Confirm password <span class="required-star">*</span></label>
          <input class="glass-input" type="password" id="regConfirmPassword" placeholder="Confirm password" data-i18n-placeholder="confirm_password_placeholder" autocomplete="new-password" required />
          <div id="passwordMatchError" aria-live="assertive"
            style="color: var(--danger); font-size: 0.9rem; margin-top: -10px; margin-bottom: 15px; display: none; text-align:center;">
            <i class="fas fa-times-circle"></i> <span data-i18n="password_mismatch">Passwords do not match</span>
          </div>
          <button type="submit" class="glass-btn primary" id="registerBtn"
            style="width:100%; margin-bottom:16px;" data-i18n="register_btn">Register</button>
        </form>
        <button class="glass-btn" style="width:100%;" id="backToLogin" type="button" data-i18n="back_to_login">← Back to login</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>

</html>
