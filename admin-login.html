<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URSA · Admin Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(135deg, #05201f, #0a2a28);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: rgba(8, 38, 36, 0.75);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(77, 255, 158, 0.25);
      z-index: 1000;
    }
    .brand-name {
      color: #4dbfa3;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .top-actions {
      display: flex;
      gap: 12px;
    }
    .top-btn {
      border: 1px solid rgba(77, 255, 158, 0.35);
      color: #4dbfa3;
      background: rgba(77, 191, 163, 0.12);
      padding: 10px 16px;
      border-radius: 28px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .top-btn.primary {
      background: rgba(77, 191, 163, 0.25);
      color: #05201f;
      font-weight: 700;
    }
    .container {
      margin-top: 90px;
    }
  </style>
</head>
<body class="dark login-page">
  <div class="topbar">
    <div class="brand">
      <span class="brand-name">URSA</span>
    </div>
    <div class="top-actions">
      <button id="langToggle" class="top-btn" data-i18n="lang_btn">العربية</button>
      <a href="index.html" class="top-btn" data-i18n="home_btn">الرئيسية</a>
    </div>
  </div>
  <div class="container">
    <div id="page-login" class="page active-page">
      <div class="glass-card auth-card">
        <h1 style="text-align:center; margin-bottom:20px;"><i class="fas fa-shield-alt"></i> <span data-i18n="admin_login_title">تسجيل دخول المسؤول</span></h1>
        <p style="text-align:center; color: var(--text-secondary); margin-bottom:25px;" data-i18n="admin_login_desc">أدخل كلمة مرور المسؤول للوصول للنظام</p>
        <div class="error-message" id="adminError"></div>
        <form id="adminLoginForm" onsubmit="event.preventDefault(); adminLogin();">
          <label data-i18n="admin_password_label">كلمة مرور المسؤول <span class="required-star">*</span></label>
          <input class="glass-input" type="password" id="adminPassword" placeholder="••••••••" required />
          <button type="submit" class="glass-btn primary" style="width:100%; margin-bottom:16px;" data-i18n="login_btn">تسجيل الدخول</button>
        </form>
        <div style="text-align: center; margin-top: 20px;">
          <a href="index.html" style="color: var(--text-secondary); text-decoration: none;" data-i18n="back_home">← العودة إلى الصفحة الرئيسية</a>
        </div>
      </div>
    </div>
  </div>
  <script src="admin-script.js"></script>
  <script>
    var translations = {
      ar: {
        lang_btn: 'English',
        home_btn: 'الرئيسية',
        admin_login_title: 'تسجيل دخول المسؤول',
        admin_login_desc: 'أدخل كلمة مرور المسؤول للوصول للنظام',
        admin_password_label: 'كلمة مرور المسؤول',
        login_btn: 'تسجيل الدخول',
        back_home: '← العودة إلى الصفحة الرئيسية'
      },
      en: {
        lang_btn: 'العربية',
        home_btn: 'Home',
        admin_login_title: 'Admin Login',
        admin_login_desc: 'Enter admin password to access the system',
        admin_password_label: 'Admin Password',
        login_btn: 'Login',
        back_home: '← Back to Home'
      }
    };
    function applyLanguage(lang) {
      document.documentElement.lang = lang === 'ar' ? 'ar' : 'en';
      document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
      var elements = document.querySelectorAll('[data-i18n]');
      elements.forEach(function(el) {
        var key = el.getAttribute('data-i18n');
        var text = translations[lang][key];
        if (typeof text === 'string') {
          el.textContent = text;
        }
      });
      localStorage.setItem('ursa_lang', lang);
    }
    var savedLang = localStorage.getItem('ursa_lang') || 'ar';
    applyLanguage(savedLang);
    var langToggle = document.getElementById('langToggle');
    langToggle.addEventListener('click', function() {
      var current = document.documentElement.lang === 'ar' ? 'ar' : 'en';
      var next = current === 'ar' ? 'en' : 'ar';
      applyLanguage(next);
    });
  </script>
</body>
</html>
