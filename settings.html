<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URSA · Settings</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
</head>
<body class="dark">
  <div class="container">
    <div id="page-settings" class="page active-page">
      <h2 data-i18n="settings_title">⚙️ Profile</h2>
      <div class="glass-card">
        <div class="profile-image-container">
          <div class="profile-image"><img src="URSA 3.png" alt="Profile Picture" /></div>
        </div>
        <div class="upload-hint"><i class="fas fa-shield-halved"></i> <span data-i18n="settings_profile_preview">URSA profile preview</span></div>
        <form id="settingsForm">
          <label data-i18n="full_name_label">Full name <span class="required-star">*</span></label>
          <input class="glass-input" id="settingsFullName" required />
          <label data-i18n="phone_label">Phone <span class="required-star">*</span></label>
          <input class="glass-input" id="settingsPhone" maxlength="11" required />
          <label data-i18n="governorate_label">Governorate <span class="required-star">*</span></label>
          <input class="glass-input" id="settingsGovernorate" required />
          <button type="submit" class="glass-btn primary" style="margin-bottom: 15px;"><i class="fas fa-save"></i> <span data-i18n="update_profile_btn">Update profile</span></button>
        </form>
        <hr />
        <button class="glass-btn" style="width:100%; color: var(--danger); border-color: var(--danger);" id="logoutBtn" type="button">
          <i class="fas fa-sign-out-alt" style="margin-right: 10px;"></i> <span data-i18n="logout_btn">Log Out</span>
        </button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
